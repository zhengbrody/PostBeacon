name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      # Offline suites only — the live provider eval (tests/eval.live.test.ts)
      # needs API keys and is run manually with RUN_LIVE_EVAL=1.
      - run: npm test
      - run: npm run build
